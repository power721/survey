server:
  port: 8080

spring:
  profiles:
    active: h2

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  messages:
    basename: i18n/messages
    encoding: UTF-8

app:
  upload:
    dir: uploads
    max-size: 104857600
  jwt:
    secret: "YTJkNGY2ZjgtYzRiMC00YTg3LWE3ZmEtMjc2YzhhZTkwMDFhCg=="
    expiration-ms: 604800000
  cors:
    allowed-origins: "http://localhost:5173"
  oauth2:
    frontend-url: "http://localhost:5173"
    github:
      client-id: "${GITHUB_CLIENT_ID:}"
      client-secret: "${GITHUB_CLIENT_SECRET:}"
    google:
      client-id: "${GOOGLE_CLIENT_ID:}"
      client-secret: "${GOOGLE_CLIENT_SECRET:}"
